<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Demon Neo</title>
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="images/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/android-chrome-512x512.png">
  <style>
    :root {
      --bg-start: #0f172a;
      --bg-end: #1e293b;
      --panel: rgba(15, 23, 42, 0.65);
      --text: #e2e8f0;
      --accent: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #334155 0%, var(--bg-start) 45%, var(--bg-end) 100%);
      overflow: hidden;
    }

    .card {
      width: 100vw;
      height: 100vh;
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: hidden;
      backdrop-filter: none;
      box-shadow: none;
      position: relative;
    }

    .hero {
      display: block;
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: contain;
    }

    .caption {
      margin: 0;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 18px 16px;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #cbd5e1;
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      background: linear-gradient(to top, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0));
    }

    .caption span {
      color: var(--accent);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .caption {
        font-size: 0.8rem;
        letter-spacing: 0.06em;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="hero" src="images/demonneo.jpg" alt="Demon Neo artwork">
    <p class="caption"><span>Official Demon Neo</span> image showcase</p>
  </main>
</body>
</html>
